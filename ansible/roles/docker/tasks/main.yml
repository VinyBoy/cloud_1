---
- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent
    purge: true
  ignore_errors: true

- name: Install Docker repository dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Get system architecture for apt
  ansible.builtin.command: dpkg --print-architecture
  register: docker_arch
  changed_when: false

- name: Add Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_facts["distribution_release"] }}
      Components: stable
      Architectures: {{ docker_arch.stdout }}
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Check Docker version
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Show Docker version
  ansible.builtin.debug:
    var: docker_version.stdout

- name: Check Docker Compose version
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Show Docker Compose version
  ansible.builtin.debug:
    var: docker_compose_version.stdout